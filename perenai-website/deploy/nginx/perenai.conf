# Host-level Nginx — SSL termination for OVH VPS
# Install: sudo cp deploy/nginx/perenai.conf /etc/nginx/sites-available/perenai.conf
#          sudo ln -sf /etc/nginx/sites-available/perenai.conf /etc/nginx/sites-enabled/
# SSL:     sudo certbot --nginx -d perenai.ma -d www.perenai.ma

upstream perenai_frontend {
    server 127.0.0.1:8080;
    keepalive 16;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name perenai.ma www.perenai.ma;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name perenai.ma www.perenai.ma;

    # Certbot will inject these paths after first run:
    ssl_certificate     /etc/letsencrypt/live/perenai.ma/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/perenai.ma/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;

    client_max_body_size 20M;

    # Gzip for static assets served by the frontend container
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    location / {
        proxy_pass http://perenai_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}
