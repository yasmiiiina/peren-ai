# PEREN AI — production stack (AWS EC2 / OVH VPS)
# Usage: cp .env.production.example .env && docker compose up -d --build

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-perenai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-perenai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-perenai} -d ${POSTGRES_DB:-perenai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - perenai_internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-perenai}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-perenai}
      APP_ENV: production
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - perenai_internal
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_PAYPAL_CLIENT_ID: ${VITE_PAYPAL_CLIENT_ID:-}
        VITE_PAYPAL_PLAN_ID_MONTHLY: ${VITE_PAYPAL_PLAN_ID_MONTHLY:-}
        VITE_PAYPAL_PLAN_ID_QUARTERLY: ${VITE_PAYPAL_PLAN_ID_QUARTERLY:-}
        VITE_PAYPAL_PLAN_ID_YEARLY: ${VITE_PAYPAL_PLAN_ID_YEARLY:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8080}:80"
    networks:
      - perenai_internal

volumes:
  postgres_data:

networks:
  perenai_internal:
    driver: bridge
